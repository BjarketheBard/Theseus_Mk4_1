# This file contains common pin mappings for the BIGTREETECH Manta M5P
# To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" "8 MHz crystal"
# and "USB (on PA11/PA12)" or "CAN bus (on PD0/PD1)".

# See docs/Config_Reference.md for a description of parameters.

# Main printer config
[include stepper.cfg]
[include tmc2209.cfg]
#[include extruder.cfg]
#[include heater_bed.cfg]
[include fan.cfg]
[include macro.cfg]
[include KAMP_Settings.cfg]
[include bigtreetech-ebb-canbus-v1.2.cfg]
#sensor_type:MAX31865
#sensor_pin: PA4
#spi_bus: spi1
#rtd_nominal_r: 100
#rtd_reference_r: 430
#rtd_num_of_wires: 2

[force_move] 
enable_force_move: true 

#[filament_switch_sensor material_0]
#switch_pin: PC2

#[extruder1]
#step_pin: PB0
#dir_pin: PB1
#enable_pin: !PC4
#heater_pin: PA7
#sensor_pin: PA2
#...

#[heater_fan fan1]
#pin: PA3

#[heater_fan SoC_fan]
#pin: CB1: gpio79
#pin: RPI: gpio26

[mcu]
#serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_2E00370008504E5238363120-if00
canbus_uuid: ed4c95b3cf4d

[mcu rpi]
serial: /tmp/klipper_host_mcu

[mcu cartographer]
canbus_uuid: 790cae418c52 
#serial: /dev/serial/by-id/usb-Cartographer_614e_32000700124330394D363620-if00
#    adjust to suit your scanner, if using usb change to serial

[mcu btt_adxl345]
serial: /dev/serial/by-id/usb-Klipper_rp2040_504434041054A01C-if00

[adxl345 hotend]
cs_pin: cartographer:PA3
spi_bus: spi1

[adxl345 bed]
cs_pin: btt_adxl345:gpio9
spi_bus: spi1_gpio8_gpio11_gpio10
axes_map: -x,-y,-z

[resonance_tester]
accel_chip_x: adxl345 hotend
accel_chip_y: adxl345 bed
probe_points: 100, 100, 20

[cartographer]
mcu: cartographer
x_offset: 0
y_offset: -23
verbose: no

[temperature_sensor Cartographer_MCU]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[bed_mesh]
zero_reference_position: 110,110
speed: 200
horizontal_move_z: 5
mesh_min: 20,20
mesh_max: 175,165
probe_count: 20,20
adaptive_margin: 10
algorithm: bicubic
mesh_pps: 0,0

[adxl345 hotend]
cs_pin: cartographer:PA3
spi_bus: spi1

#[adxl345 bed]
#cs_pin: PC0
#spi_software_sclk_pin: PB13
#spi_software_miso_pin: PB14
#spi_software_mosi_pin: PB15

[adxl345 bed]
cs_pin: btt_adxl345:gpio9
spi_bus: spi1_gpio8_gpio11_gpio10

[resonance_tester]
accel_chip_x: adxl345 hotend
accel_chip_y: adxl345 bed
probe_points:
    100, 100, 20

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 2500
max_z_velocity: 10
max_z_accel: 120
square_corner_velocity: 6


[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PD5, EXP1_3=PB3, EXP1_5=PB5, EXP1_7=PB7, EXP1_9=<GND>,
    EXP1_2=PD4,  EXP1_4=PD6, EXP1_6=PB4, EXP1_8=PB6, EXP1_10=<5V>,
    # EXP2 header
    EXP2_1=PB14, EXP2_3=PB8, EXP2_5=PC10, EXP2_7=PC12,  EXP2_9=<GND>,
    EXP2_2=PB13, EXP2_4=PB9, EXP2_6=PB15, EXP2_8=<RST>, EXP2_10=<NC>

# See the sample-lcd.cfg file for definitions of common LCD displays.

#[extruder]
#E3D Revo Hemera XS
#max_extrude_only_distance: 1000.0
#step_pin: PB12
#dir_pin: PB11
#enable_pin: !PA8
#microsteps: 16
#rotation_distance: 8.073476064
#nozzle_diameter: 0.400
