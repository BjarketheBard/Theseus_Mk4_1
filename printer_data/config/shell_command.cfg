[gcode_shell_command hello_world]
command: echo hello world
timeout: 2.
verbose: True
[gcode_macro HELLO_WORLD]
gcode:
    RUN_SHELL_COMMAND CMD=hello_world
[gcode_shell_command wifi_on]
command: nmcli radio wifi on
timeout: 10.
verbose: True

[gcode_shell_command wifi_off]
command: nmcli radio wifi off
timeout: 10.
verbose: True

[gcode_shell_command wifi_status]
command: nmcli radio wifi
timeout: 10.
verbose: True

[gcode_macro WIFI_ON]
gcode:
    RUN_SHELL_COMMAND CMD=wifi_on
    M117 WiFi On

[gcode_macro WIFI_OFF]
gcode:
    RUN_SHELL_COMMAND CMD=wifi_off
    M117 WiFi Off

[gcode_macro WIFI_STATUS]
gcode:
    RUN_SHELL_COMMAND CMD=wifi_status

[gcode_shell_command FIX_CAN_AND_RESTART_KLIPPER]
command: /home/bryan/printer_data/config/scripts/fix_can_and_restart_klipper.sh
timeout: 30.
verbose: True

[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True