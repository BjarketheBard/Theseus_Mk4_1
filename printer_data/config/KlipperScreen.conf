[main]
use_default_menu: True

[printer Theseus]
titlebar_items: Cartographer_MCU, raspberry_pi
titlebar_name_type: short
z_babystep_values: 0.01, 0.05
move_distances: 0.1, 0.5, 1, 5, 10, 25
extrude_distances: 2, 5, 10, 25
extrude_speeds: 1, 2, 5, 10

[menu __main theseus_tools]
name: Theseus Tools
icon: settings

[menu __main theseus_tools home_all]
name: Home All
icon: home
method: printer.gcode.script
params: {"script":"G28"}

[menu __main theseus_tools mesh]
name: Adaptive Mesh
icon: bed
method: printer.gcode.script
params: {"script":"BED_MESH_CLEAR\nBED_MESH_CALIBRATE ADAPTIVE=1"}

[menu __main theseus_tools screws]
name: Screws Tilt
icon: bed
method: printer.gcode.script
params: {"script":"SCREWS_TILT_CALCULATE"}
enable: {{ 'SCREWS_TILT_CALCULATE' in printer.available_commands }}

[menu __main theseus_tools twist]
name: Axis Twist
icon: bed
method: printer.gcode.script
params: {"script":"AXIS_TWIST_COMPENSATION_CALIBRATE"}
enable: {{ 'AXIS_TWIST_COMPENSATION_CALIBRATE' in printer.available_commands }}

[menu __main theseus_tools touch]
name: Touch Calibrate
icon: z-farther
method: printer.gcode.script
params: {"script":"CARTOGRAPHER_TOUCH_CALIBRATE"}
enable: {{ 'CARTOGRAPHER_TOUCH_CALIBRATE' in printer.available_commands }}

[menu __main theseus_tools park]
name: Smart Park
icon: arrow-up
method: printer.gcode.script
params: {"script":"SMART_PARK"}
enable: {{ 'SMART_PARK' in printer.gcode_macros.list }}

[menu __main theseus_tools purge]
name: Line Purge
icon: extrude
method: printer.gcode.script
params: {"script":"LINE_PURGE"}
enable: {{ 'LINE_PURGE' in printer.gcode_macros.list }}

[menu __main theseus_tools leds]
name: LEDs Off
icon: light
method: printer.gcode.script
params: {"script":"SET_LED LED=my_neopixel RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=1"}
enable: {{ printer.leds.count > 0 }}